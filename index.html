<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello — Localized Greeting App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="login-card">
        <h1>Hello — Localized Greeting App</h1>

        <div id="login-view">
            <form id="login-form">
                <div class="field">
                    <label for="username">User Name</label>
                    <input type="text" id="username" name="username" autocomplete="username">
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" autocomplete="current-password">
                </div>

                <div class="field">
                    <label for="lang-override">Language Code (optional)</label>
                    <input type="text" id="lang-override" name="lang-override" placeholder="e.g. fr, de, ja">
                </div>

                <button id="login-btn" type="button">Login</button>
            </form>
        </div>

        <div id="logged-in-view" class="hidden">
            <p id="welcome-message"></p>
            <div id="location-details"></div>
            <button id="logout-btn" type="button">Logout</button>
        </div>

    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
